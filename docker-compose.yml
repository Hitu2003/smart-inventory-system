version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: smart_inventory_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smart_inventory
    networks:
      - app-network

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: smart_inventory_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/smart_inventory
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 30d
      CLIENT_URL: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - app-network
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.client
    container_name: smart_inventory_client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge
